name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # npm Trusted Publishing (provenance + OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing requires npm CLI >= 11.5.1.
      # Node 20 ships npm 10.x by default, so install latest explicitly.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish with provenance (Trusted Publishing via OIDC)
        run: npm publish --provenance --access public
