name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # cut a GitHub Release on publish
      id-token: write  # npm Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing requires npm CLI >= 11.5.1. npm@latest (12.x) now
      # requires Node >= 22, so setup-node must pin 22+ before installing it.
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - run: npm run build

      - run: npm test

      # No --provenance: sigstore attestations require a public source repo;
      # this repo is currently private. Trusted Publishing OIDC still
      # authorises the publish itself.
      - name: Publish (Trusted Publishing via OIDC)
        run: npm publish --access public

      - name: Verify npm received release
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in {1..12}; do
            PUBLISHED="$(npm view aethis-mcp version)"
            if [[ "$PUBLISHED" == "$VERSION" ]]; then
              echo "npm has aethis-mcp $VERSION"
              exit 0
            fi
            echo "npm reports $PUBLISHED, waiting for $VERSION (attempt $attempt/12)"
            sleep 10
          done
          exit 1

      # Cut a GitHub Release for the just-published tag, using the matching
      # CHANGELOG section as the notes body. Introduces the Releases channel on
      # this repo (workspace epic #526 P5, aethis-mcp#59). Idempotent: a re-run
      # or dispatch against an already-released tag skips instead of failing.
      - name: Cut GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="v${VERSION}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          NOTES_FILE="$(mktemp)"
          # Extract the "## <version> ..." block from CHANGELOG.md, up to the
          # next "## " heading. $2 is an exact string compare on the version.
          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if ($2 == ver) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "No CHANGELOG section found for $VERSION"
            exit 1
          fi
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes-file "$NOTES_FILE"

      - name: Trigger workspace release sync
        env:
          WORKSPACE_SYNC_TOKEN: ${{ secrets.WORKSPACE_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${WORKSPACE_SYNC_TOKEN:-}" ]]; then
            echo "WORKSPACE_SYNC_TOKEN not configured; skipping workspace dispatch."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $WORKSPACE_SYNC_TOKEN" \
            https://api.github.com/repos/Aethis-ai/aethis-workspace/dispatches \
            -d "{\"event_type\":\"release-package-published\",\"client_payload\":{\"package\":\"aethis-mcp\",\"version\":\"${GITHUB_REF_NAME#v}\",\"tag\":\"$GITHUB_REF_NAME\"}}"
